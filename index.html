  <style>
    body {
      background: #070707;
      margin: 0;
      overflow: auto;
      /* NEVER block scroll — loader is position:fixed */
      -webkit-overflow-scrolling: touch;
      /* iOS momentum scroll */
    }

    #initial-loader {
      position: fixed;
      inset: 0;
      background: #070707;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loader-dot {
      width: 12px;
      height: 12px;
      background: #C47E3E;
      border-radius: 50%;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(0.8);
        opacity: 0.5;
      }

      50% {
        transform: scale(1.2);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="initial-loader">
    <div class="loader-dot"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
